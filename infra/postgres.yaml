apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-postgres
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: demo-postgres
  template:
    metadata:
      labels:
        app: demo-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          env:
            - name: POSTGRES_USER
              value: demo
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: demo-postgres-credentials
                  key: password
            - name: POSTGRES_DB
              value: demo
          ports:
            - containerPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: demo-postgres
  namespace: demo
spec:
  selector:
    app: demo-postgres
  ports:
    - port: 5432
      targetPort: 5432