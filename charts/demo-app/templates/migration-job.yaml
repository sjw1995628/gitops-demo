apiVersion: batch/v1
kind: Job
metadata:
  name: demo-app-migration
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migration
          image: busybox:1.36
          command:
            - sh
            - -c
            - echo "DB 마이그레이션 실행 중..."; sleep 10; echo "마이그레이션 완료"