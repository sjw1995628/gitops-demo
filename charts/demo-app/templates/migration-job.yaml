apiVersion: batch/v1
kind: Job
metadata:
  name: demo-app-migration
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  backoffLimit: 1
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migration
          image: postgres:16-alpine
          env:
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: demo-postgres-credentials
                  key: password
          command:
            - sh
            - -c
            - |
              set -e
              echo "postgres 연결 시도..."
              psql -h demo-postgres -U demo -d demo -c "CREATE TABLE IF NOT EXISTS users (id serial PRIMARY KEY, name text);"
              echo "마이그레이션 완료"