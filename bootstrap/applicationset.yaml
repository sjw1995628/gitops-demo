apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: demo-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/sjw1995628/gitops-demo.git
        revision: main
        directories:
          - path: charts/*
  template:
    metadata:
      name: '{{.path.basename}}'
      annotations:
        argocd-image-updater.argoproj.io/image-list: nginx=nginx
        argocd-image-updater.argoproj.io/nginx.update-strategy: semver
        argocd-image-updater.argoproj.io/nginx.helm.image-name: image.repository
        argocd-image-updater.argoproj.io/nginx.helm.image-tag: image.tag
        argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/git-creds
        argocd-image-updater.argoproj.io/git-branch: main
    spec:
      project: demo-team
      source:
        repoURL: https://github.com/sjw1995628/gitops-demo.git
        targetRevision: main
        path: '{{.path.path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: demo
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true