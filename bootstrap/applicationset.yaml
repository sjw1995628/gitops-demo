apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: demo-apps
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: https://github.com/sjw1995628/gitops-demo.git
        revision: main
        directories:
          - path: charts/*
  template:
    metadata:
      name: '{{.path.basename}}'
    spec:
      project: demo-team
      source:
        repoURL: https://github.com/sjw1995628/gitops-demo.git
        targetRevision: main
        path: '{{.path.path}}'
      destination:
        server: https://kubernetes.default.svc
        namespace: demo
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true